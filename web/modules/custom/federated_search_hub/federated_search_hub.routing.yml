federated_search_hub.batch_index:
  path: '/federated-search/batch-index'
  defaults:
    _controller: '\Drupal\federated_search_hub\Controller\BatchIndexController::batchIndex'
    _title: 'Federated Search Batch Index'
  methods: [POST]
  requirements:
    _custom_access: '\Drupal\federated_search_hub\Controller\BatchIndexController::access'

federated_search_hub.status:
  path: '/federated-search/status'
  defaults:
    _controller: '\Drupal\federated_search_hub\Controller\BatchIndexController::status'
    _title: 'Federated Search Status'
  methods: [GET]
  requirements:
    _custom_access: '\Drupal\federated_search_hub\Controller\BatchIndexController::access'

federated_search_hub.delete:
  path: '/federated-search/delete'
  defaults:
    _controller: '\Drupal\federated_search_hub\Controller\BatchIndexController::deleteBySite'
    _title: 'Delete Site Content'
  methods: [POST]
  requirements:
    _custom_access: '\Drupal\federated_search_hub\Controller\BatchIndexController::access'

federated_search_hub.search:
  path: '/federated-search'
  defaults:
    _controller: '\Drupal\federated_search_hub\Controller\SearchController::search'
    _title: 'Federated Search'
  requirements:
    _permission: 'access content'

federated_search_hub.site_labels:
  path: '/admin/config/search/federated-search/site-labels'
  defaults:
    _form: '\Drupal\federated_search_hub\Form\SiteLabelsForm'
    _title: 'Federated Search Site Labels'
  requirements:
    _permission: 'administer search_api'
